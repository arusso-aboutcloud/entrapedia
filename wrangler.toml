# Entrapedia — wrangler.toml
#
# Storage bindings for the Entrapedia Workers. The resource IDs below are NOT
# secrets and are committed intentionally. The account ID and API tokens are
# NOT in this file — they live in Wrangler secrets / .dev.vars.
#
# Storage resources were created and wired in CHUNK 2. The worker (CHUNK 3a
# ingestion + CHUNK 3b embedding) is wired below. AI + VECTORIZE are active as of
# chunk 3b (embedding); KV stays a stub until chunk 4 (answer cache).
#
# Secrets (NOT committed; set via `wrangler secret put` — see docs/OPERATIONS.md):
#   GITHUB_TOKEN   - GitHub token (public-repo read) for GitHub API + raw fetches.
#   TRIGGER_SECRET - guards the manual /run and /embed triggers on the worker.
#
# See DESIGN.md (sections 3, 4, 6) and ARCHITECTURE.md for the contracts these
# bindings satisfy.

name = "entrapedia"
main = "workers/ingestion/index.js"
compatibility_date = "2026-06-04"

# --- Scheduled triggers (Cron) -------------------------------------------
# "0 6 * * *"      -> daily Tier-A ingestion reconcile (rotating lead source).
# "7,27,47 * * * *" -> embedding pass, 3x/hour; each invocation embeds a few docs
#                     and self-throttles against the daily EMBED_NEURON_BUDGET
#                     (9000) so the corpus embeds incrementally without exceeding
#                     the 10k-neuron/day free-tier ceiling. The scheduled handler
#                     branches on event.cron.
[triggers]
crons = ["0 6 * * *", "7,27,47 * * * *"]

# --- D1: index, metadata, source/trust/license fields, answer cache ------
[[d1_databases]]
binding = "DB"
database_name = "entrapedia"
database_id = "fcf6aeff-74d0-4978-9df2-49ef344c6dd6"

# --- R2: raw fetched markdown / HTML — the corpus of record ---------------
[[r2_buckets]]
binding = "CORPUS"
bucket_name = "entrapedia-corpus"

# --- Vectorize: embeddings for RAG retrieval (chunk 3b) ------------------
# Embedding model @cf/baai/bge-base-en-v1.5 -> 768 dimensions, float32; index
# metric cosine. The index dimension (768) MUST match this model. Trust
# separation is by metadata filter (trust / source / content_type), not by
# separate indexes or namespaces.
[[vectorize]]
binding = "VECTORIZE"
index_name = "entrapedia-chunks"

# --- Workers AI: bge-base embeddings (chunk 3b; grounded generation later) -
[ai]
binding = "AI"

# --- KV: answer cache, normalized-question keyed (chunk 4) ---------------
# Re-enabled in chunk 4 (RAG / answer cache); the ingestion+embedding worker
# does not use it, so it stays a stub (avoids forcing KV-write onto the token).
# [[kv_namespaces]]
# binding = "ANSWER_CACHE"
# id = "7f1f60eb51c54429b81a363a8b89eb9a"
