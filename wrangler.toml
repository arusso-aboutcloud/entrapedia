# Entrapedia — wrangler.toml
#
# Storage bindings for the Entrapedia Workers. The resource IDs below are NOT
# secrets and are committed intentionally. The account ID and API tokens are
# NOT in this file — they live in Wrangler secrets / .dev.vars.
#
# Storage resources were created and wired in CHUNK 2. The ingestion worker
# (CHUNK 3a) is wired below: `main` points at workers/ingestion and the daily
# Tier-A cron is active. The AI and VECTORIZE bindings are declared for later
# chunks (3b/4) but are NOT used by the ingestion worker.
#
# Secrets (NOT committed; set via `wrangler secret put` — see docs/OPERATIONS.md):
#   GITHUB_TOKEN   - GitHub token (public-repo read) for GitHub API + raw fetches.
#   TRIGGER_SECRET - guards the manual /run trigger on the worker.
#
# See DESIGN.md (sections 3, 4, 6) and ARCHITECTURE.md for the contracts these
# bindings satisfy.

name = "entrapedia"
main = "workers/ingestion/index.js"
compatibility_date = "2026-06-04"

# --- Scheduled re-indexing (Cron Triggers) -------------------------------
# Daily Tier-A doc-corpus reconcile (DESIGN.md §3 / ARCHITECTURE.md). Per-run
# work is capped (MAX_FILES_PER_RUN / SUBREQUEST_BUDGET) and resumable, so the
# daily cadence drives an incremental backfill and then steady-state sync.
# Change-feed (~4h) and weekly structured cadences arrive with their sources in
# later chunks.
[triggers]
crons = ["0 6 * * *"]

# --- D1: index, metadata, source/trust/license fields, answer cache ------
[[d1_databases]]
binding = "DB"
database_name = "entrapedia"
database_id = "fcf6aeff-74d0-4978-9df2-49ef344c6dd6"

# --- R2: raw fetched markdown / HTML — the corpus of record ---------------
[[r2_buckets]]
binding = "CORPUS"
bucket_name = "entrapedia-corpus"

# --- Vectorize: embeddings for RAG retrieval -----------------------------
# Embedding model @cf/baai/bge-base-en-v1.5 -> 768 dimensions, float32; index
# metric cosine. The index dimension (768) MUST match this model. Trust
# separation is by metadata filter (trust / source / content_type), not by
# separate indexes or namespaces.
[[vectorize]]
binding = "VECTORIZE"
index_name = "entrapedia-chunks"

# --- KV: answer cache (normalized-question keyed) ------------------------
[[kv_namespaces]]
binding = "ANSWER_CACHE"
id = "7f1f60eb51c54429b81a363a8b89eb9a"

# --- Workers AI: embeddings + (later, post-chunk-4) grounded generation --
[ai]
binding = "AI"
