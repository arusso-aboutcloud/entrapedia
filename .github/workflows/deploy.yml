name: deploy

# Deploys the Entrapedia ingestion worker to Cloudflare and provisions its
# runtime secrets. Uses no marketplace actions (plain git clone of the public
# repo + pinned npx wrangler), so there are no third-party actions to SHA-pin.
#
# Required repository secrets:
#   CLOUDFLARE_API_TOKEN   - Cloudflare API token (Workers Scripts:Edit + D1/R2/
#                            KV/Vectorize/Workers AI:Edit, Account Settings:Read).
#   GH_DOCS_TOKEN          - GitHub fine-grained PAT, Public repositories
#                            (read-only). Pushed onto the worker as GITHUB_TOKEN.
#   TRIGGER_SECRET         - shared secret guarding the worker's /run trigger.
# Recommended:
#   CLOUDFLARE_ACCOUNT_ID  - account id (kept out of the committed wrangler.toml).

on:
  workflow_dispatch:
    inputs:
      run_backfill:
        description: 'Run the backfill (curl /run) after deploy'
        type: boolean
        default: false
      iterations:
        description: 'Number of /run iterations'
        type: string
        default: '6'
      max:
        description: 'MAX files per /run'
        type: string
        default: '25'
      source:
        description: 'Limit to one source key (blank = all)'
        type: string
        default: ''
      sleep_s:
        description: 'Seconds to sleep between iterations (rate pacing)'
        type: string
        default: '6'
      mode:
        description: 'Endpoint: run (ingestion) | embed (3b) | search (4)'
        type: string
        default: 'run'
      docs:
        description: 'Docs per /embed call (embed mode)'
        type: string
        default: '20'
      rechunk:
        description: 'embed mode: one-permission-per-chunk re-embed of permissions-reference (mode=rechunk)'
        type: string
        default: ''
      neurons:
        description: 'embed mode: daily neuron-cap override for this invocation (blank = default 6000)'
        type: string
        default: ''
      query:
        description: 'Search query (search mode)'
        type: string
        default: ''
      scope:
        description: 'Search trust scope: official | community | both'
        type: string
        default: 'both'
      top_k:
        description: 'Search top_k (search mode)'
        type: string
        default: '5'
  push:
    branches: [main]
    paths:
      - 'workers/**'
      - 'wrangler.toml'
      - 'schema/**'

permissions:
  contents: read

concurrency:
  group: entrapedia-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WRANGLER: npx --yes wrangler@4.98.0
    steps:
      - name: Checkout (public repo, no marketplace action)
        run: git clone --depth 1 "https://github.com/${{ github.repository }}" repo

      - name: Deploy worker
        working-directory: repo
        run: |
          set -euo pipefail
          OUT=$($WRANGLER deploy 2>&1) || { echo "$OUT"; exit 1; }
          echo "$OUT"
          URL=$(printf '%s\n' "$OUT" | grep -oE 'https://[a-z0-9.-]+\.workers\.dev' | head -1 || true)
          echo "WORKER_URL=$URL" >> "$GITHUB_ENV"
          echo "Deployed at: ${URL:-<no workers.dev url>}"

      - name: Provision worker secrets
        working-directory: repo
        env:
          GH_DOCS_TOKEN: ${{ secrets.GH_DOCS_TOKEN }}
          TRIGGER_SECRET: ${{ secrets.TRIGGER_SECRET }}
        run: |
          set -euo pipefail
          if [ -n "${GH_DOCS_TOKEN:-}" ]; then
            printf '%s' "$GH_DOCS_TOKEN" | $WRANGLER secret put GITHUB_TOKEN
          else
            echo "GH_DOCS_TOKEN repo secret not set; worker will fall back to unauthenticated GitHub (60/hr)."
          fi
          if [ -n "${TRIGGER_SECRET:-}" ]; then
            printf '%s' "$TRIGGER_SECRET" | $WRANGLER secret put TRIGGER_SECRET
          else
            echo "TRIGGER_SECRET repo secret not set; the /run trigger will reject all requests."
          fi

      - name: Backfill (manual dispatch only)
        if: ${{ inputs.run_backfill == true }}
        env:
          TRIGGER_SECRET: ${{ secrets.TRIGGER_SECRET }}
          GH_DOCS_TOKEN: ${{ secrets.GH_DOCS_TOKEN }}
        run: |
          set -euo pipefail
          URL="${WORKER_URL:-}"
          if [ -z "$URL" ]; then
            echo "No workers.dev URL captured from deploy; cannot backfill over HTTP. (Cron will still run.)"
            exit 1
          fi
          N="${{ inputs.iterations }}"
          SLEEP="${{ inputs.sleep_s }}"
          MODE="${{ inputs.mode }}"
          if [ "$MODE" = "embed" ]; then
            NQS=""; if [ -n "${{ inputs.neurons }}" ]; then NQS="&neurons=${{ inputs.neurons }}"; fi
            if [ "${{ inputs.rechunk }}" = "true" ]; then
              ENDPOINT="/embed?mode=rechunk&doc=permissions-reference${NQS}"
            else
              ENDPOINT="/embed?docs=${{ inputs.docs }}${NQS}"
            fi
          elif [ "$MODE" = "search" ]; then
            ENDPOINT="/search"
            TOPK="${{ inputs.top_k }}"; [ -z "$TOPK" ] && TOPK=5
            # Multiple test queries may be passed in one run, delimited by |||
            mapfile -t QUERIES < <(printf '%s' "${{ inputs.query }}" | sed 's/|||/\n/g')
            N=${#QUERIES[@]}
          else
            Q="max=${{ inputs.max }}"
            SRC="${{ inputs.source }}"
            if [ -n "$SRC" ]; then Q="$Q&source=$SRC"; fi
            ENDPOINT="/run?$Q"
          fi
          echo "Driving $URL$ENDPOINT  x$N (mode=$MODE, sleep ${SLEEP}s, rate-guarded)"
          for i in $(seq 1 "$N"); do
            # GitHub REST rate guard (worker uses GH_DOCS_TOKEN): pause near exhaustion.
            if [ "$MODE" != "embed" ] && [ $(( (i - 1) % 25 )) -eq 0 ]; then
              rl=$(curl -fsS -H "Authorization: Bearer $GH_DOCS_TOKEN" https://api.github.com/rate_limit || echo '{}')
              rem=$(echo "$rl" | jq -r '.resources.core.remaining // 5000')
              echo "[rate] core remaining=$rem"
              if [ "$rem" -lt 600 ]; then
                reset=$(echo "$rl" | jq -r '.resources.core.reset // 0')
                now=$(date +%s); wait=$(( reset - now + 5 )); [ "$wait" -lt 5 ] && wait=60
                echo "[rate] low ($rem); backing off ${wait}s until reset"; sleep "$wait"
              fi
            fi
            if [ "$MODE" = "search" ]; then
              Q="${QUERIES[$((i-1))]}"
              BODY=$(jq -nc --arg q "$Q" --arg s "${{ inputs.scope }}" --argjson k "$TOPK" '{query:$q, trust_scope:$s, top_k:$k}')
              resp=$(curl -sS --retry 4 --retry-delay 3 --retry-all-errors -X POST \
                -H "Authorization: Bearer $TRIGGER_SECRET" -H 'Content-Type: application/json' \
                -d "$BODY" "$URL$ENDPOINT" || true)
            else
              resp=$(curl -sS --retry 4 --retry-delay 3 --retry-all-errors \
                -H "Authorization: Bearer $TRIGGER_SECRET" "$URL$ENDPOINT" || true)
            fi
            if [ -z "$resp" ]; then echo "iter $i: request failed after retries, continuing"; sleep "$SLEEP"; continue; fi
            if [ "$MODE" = "search" ]; then
              echo "=== Q$i: ${QUERIES[$((i-1))]} ==="
              echo "$resp" | jq '{cache_hit, neurons, identifier_match, least_privilege, short_circuit, count, results: [.results[] | {rank: null, match_type, score, reranked_score, permission, privilege, principal, trust, doc_title, app_guid, source_url: .citation.source_url, license: .citation.license}]}' 2>/dev/null \
                || { echo "non-json or error:"; echo "$resp" | head -c 500; }
            elif [ "$MODE" = "embed" ]; then
              if [ "${{ inputs.rechunk }}" = "true" ]; then
                echo "$resp" | jq -c '{mode, doc_id, parsed, perm, prose, embedded, neurons, deleted_old, today:.neurons_today_after, cap:.daily_cap, status, error}' 2>/dev/null \
                  || { echo "non-json or error:"; echo "$resp" | head -c 400; }
                if echo "$resp" | grep -q '"status": *"complete"'; then echo "rechunk complete; stopping."; break; fi
              else
                echo "$resp" | jq -c '{tier, docs, chunks, neurons, today:.neurons_today_after, cap:.daily_cap, status, errors, last_error}' 2>/dev/null \
                  || { echo "non-json or error:"; echo "$resp" | head -c 300; }
              fi
              # stop early once the daily neuron budget is reached
              if echo "$resp" | grep -q 'daily_budget_reached'; then echo "daily neuron budget reached; stopping."; break; fi
              if echo "$resp" | grep -q 'all_embedded'; then echo "all docs embedded; stopping."; break; fi
            else
              echo "$resp" | jq -c '.sources | to_entries[0].value | {src:.source, created, frontier, status, error}' 2>/dev/null \
                || { echo "non-json or error:"; echo "$resp" | head -c 300; }
            fi
            sleep "$SLEEP"
          done
